task:
  name: rlbench
  task_name: pour_water_to_cup
  shape_meta:
    obs:
      agent_pos:
        shape:
        - 7
        type: low_dimx
    action:
      shape:
      - 15
  env_runner:
    _target_: env_rlbench.runner.rlbench_runner.RLBenchRunner
    root_dir: /workspace/video_to_action/dolbi_data/test/${task.task_name}/all_variations/
    task_name: ${task.task_name}
    has_lang_emb: true
    use_fp: false
    fp_cam_name: cam_front
    pose_estimation_wrapper: null
  dataset:
    _target_: diffusion_policy_3d.dataset.rlbench_dataset.RLBenchDualDataset
    root_dir: /data/DOLBi/train/${task.task_name}/all_variations/
    horizon: 4
    pad_before: 1
    pad_after: 4
    seed: 42
    val_ratio: 0.1
    max_train_episodes: 100
    has_lang_emb: true
    random_aug: true
    symmetric_axis: null
    symmetric_theta_start: null
    symmetric_theta_end: null
    symmetric_theta_step: null
name: train_simple_dp3
task_name: ${task.name}
shape_meta: ${task.shape_meta}
exp_name: rlbench_multi
horizon: 4
n_obs_steps: 4
n_action_steps: 4
n_latency_steps: 0
dataset_obs_steps: ${n_obs_steps}
keypoint_visible_rate: 1.0
obs_as_global_cond: true
pose_estimation:
  mesh_dir: /workspace/video_to_action/dolbi_data/vtob_mesh/${task.task_name}/
policy:
  _target_: diffusion_policy_3d.policy.simple_dp3_dual_new.TransformerDP3DualPolicy
  use_point_crop: true
  condition_type: film
  use_down_condition: true
  use_mid_condition: true
  use_up_condition: true
  use_lang_emb: true
  use_progress: true
  embedding_dim: 256
  down_dims:
  - 128
  - 256
  - 384
  crop_shape:
  - 80
  - 80
  encoder_output_dim: 64
  horizon: ${horizon}
  kernel_size: 5
  n_action_steps: ${n_action_steps}
  n_groups: 8
  n_obs_steps: ${n_obs_steps}
  noise_scheduler:
    _target_: diffusers.schedulers.scheduling_ddim.DDIMScheduler
    num_train_timesteps: 100
    beta_start: 0.0001
    beta_end: 0.02
    beta_schedule: squaredcos_cap_v2
    clip_sample: true
    set_alpha_to_one: true
    steps_offset: 0
    prediction_type: sample
  num_inference_steps: 10
  obs_as_global_cond: true
  shape_meta: ${shape_meta}
  use_pc_color: false
  pointnet_type: pointnet
  pointcloud_encoder_cfg:
    in_channels: 3
    out_channels: ${policy.encoder_output_dim}
    use_layernorm: true
    final_norm: layernorm
    normal_channel: false
ema:
  _target_: diffusion_policy_3d.model.diffusion.ema_model.EMAModel
  update_after_step: 0
  inv_gamma: 1.0
  power: 0.75
  min_value: 0.0
  max_value: 0.9999
dataloader:
  batch_size: 256
  num_workers: 8
  shuffle: true
  pin_memory: true
  persistent_workers: false
val_dataloader:
  batch_size: 128
  num_workers: 8
  shuffle: false
  pin_memory: true
  persistent_workers: false
optimizer:
  _target_: torch.optim.AdamW
  lr: 0.0001
  betas:
  - 0.95
  - 0.999
  eps: 1.0e-08
  weight_decay: 0.01
training:
  device: cuda:0
  seed: 1001
  debug: true
  resume: true
  lr_scheduler: cosine
  lr_warmup_steps: 2000
  num_epochs: 30001
  gradient_accumulate_every: 1
  use_ema: true
  rollout_every: 200
  checkpoint_every: 200
  val_every: 500
  sample_every: 5
  max_train_steps: null
  max_val_steps: null
  tqdm_interval_sec: 1.0
logging:
  group: ${exp_name}
  id: null
  mode: disabled
  name: ${task.task_name}_${training.seed}_dw_local
  project: dp3-${task.name}
  resume: true
  tags:
  - dp3
checkpoint:
  save_ckpt: ''
  topk:
    monitor_key: test_mean_score
    mode: max
    k: 1
    format_str: epoch={epoch:04d}-test_mean_score={test_mean_score:.3f}.ckpt
  save_last_ckpt: true
  save_last_snapshot: false
multi_run:
  run_dir: outputs/${now:%Y.%m.%d}/${now:%H.%M.%S}_${name}_${task_name}
  wandb_name_base: ${now:%Y.%m.%d-%H.%M.%S}_${name}_${task_name}
evaluation:
  eval_epoch: 3000
